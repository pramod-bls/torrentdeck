name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # Import the Developer ID cert into a keychain with the dedicated action.
      # electron-builder's own `security import` is unreliable on the macOS
      # runners ("SecKeychainItemImport: parameters not valid"); this imports
      # cleanly, and electron-builder then signs via keychain auto-discovery
      # (CSC_LINK is intentionally unset so it isn't misread as a path).
      # CSC_LINK holds the base64 of the .p12; CSC_KEY_PASSWORD its password.
      - name: Import Apple signing certificate (macOS)
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization (signing uses the keychain identity imported above)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
