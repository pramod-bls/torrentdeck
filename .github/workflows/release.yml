name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --mac
          - os: ubuntu-latest
            args: --linux
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # Materialize the Developer ID cert to a real .p12 file. electron-builder
      # would otherwise mistake the base64 CSC_LINK for a path (base64 contains
      # '/'), so we decode it and point CSC_LINK at the file. macOS only —
      # Windows/Linux must not receive CSC_LINK at all.
      - name: Decode signing certificate (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "$CSC_LINK_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          echo "CSC_LINK=$RUNNER_TEMP/certificate.p12" >> "$GITHUB_ENV"
        env:
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK }}

      - name: Build and publish
        run: npx electron-vite build && npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CSC_LINK is provided on macOS via $GITHUB_ENV (decoded above); it is
          # intentionally absent on Windows/Linux so it isn't misread as a cert.
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
