name: Release (Linux)

# macOS and Windows are built and published locally (they sign with the
# developer's keychain / are unsigned NSIS) — see the `release:mac` / `release:win`
# npm scripts. Linux AppImage + deb need a Linux host, so CI builds and publishes
# them to the same GitHub release for the tag. Runs on `v*` tags, or manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# electron-builder needs to create/upload the GitHub release with GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Build and publish (Linux)
        run: npx electron-vite build && npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
