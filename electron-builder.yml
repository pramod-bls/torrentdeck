appId: com.blacklightsurgical.torrentdeck
productName: TorrentDeck
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
protocols:
  - name: Magnet link
    schemes:
      - magnet
fileAssociations:
  - ext: torrent
    name: BitTorrent metainfo
    mimeType: application/x-bittorrent
    role: Viewer
mac:
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  # Signing/notarization pick up CSC_LINK / CSC_KEY_PASSWORD and
  # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID from the environment.
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  target:
    - nsis
linux:
  category: Network
  target:
    - AppImage
    - deb
  desktop:
    entry:
      MimeType: x-scheme-handler/magnet;application/x-bittorrent;
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
publish:
  provider: github
